name: Run Discord Bot

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  # 🟢 THIS ADDS THE MANUAL "RUN" BUTTON FOR YOUR PHONE
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Launch Bot Live
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          python bot.py
