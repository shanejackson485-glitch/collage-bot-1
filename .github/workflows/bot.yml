name: Discord Bot Workflow

# 1. THE TRIGGER: Runs code checks every time you push to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 2: Clones your GitHub repository onto the runner machine
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 3: Sets up the correct Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 4: Installs the required libraries from your requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 5: Runs a syntax check to ensure your Python and Cogs have no syntax errors
    - name: Lint with flake8 (Syntax Check)
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
